<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiadásaim – Prémium Kiadáskövető</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-12">

    <nav class="bg-slate-900 text-white shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <a href="index.html" class="hover:text-slate-300 transition mr-2"><i class="fa-solid fa-arrow-left"></i></a>
                <div class="bg-blue-600 p-2 rounded-xl">
                    <i class="fa-solid fa-wallet text-sm"></i>
                </div>
                <span class="text-lg font-bold tracking-tight">Kiadásaim App</span>
            </div>
            <div class="flex gap-2">
                <button onclick="exportData()" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-2 rounded-lg transition flex items-center gap-1.5 cursor-pointer" title="Biztonsági mentés letöltése (Drive-ba másolható)">
                    <i class="fa-solid fa-cloud-arrow-down text-blue-400"></i> Mentés
                </button>
                <label class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-2 rounded-lg transition flex items-center gap-1.5 cursor-pointer" title="Adatok visszaállítása fájlból">
                    <i class="fa-solid fa-cloud-arrow-up text-emerald-400"></i> Betöltés
                    <input type="file" id="importFile" onchange="importData(event)" class="hidden" accept=".json">
                </label>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 bg-white rounded-3xl p-6 shadow-xs border border-slate-200/60 h-fit space-y-4">
            <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
                <i class="fa-solid fa-plus-circle text-blue-600"></i> Új tétel rögzítése
            </h2>
            
            <form id="expense-form" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Összeg (Ft)</label>
                    <input type="number" id="exp-amount" required placeholder="Pl. 4500"
                        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Megjegyzés / Név (Opcionális)</label>
                    <input type="text" id="exp-name" placeholder="Pl. OMV tankolás, Tesco, Kávézó"
                        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Kategória</label>
                    <select id="exp-category" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
                        <option value="Bevásárlás">🛒 Bevásárlás</option>
                        <option value="Rezsi & Lakás">🏠 Rezsi & Lakás</option>
                        <option value="Utazás & Auto">🚗 Utazás & Autó</option>
                        <option value="Szórakozás">🎉 Szórakozás</option>
                        <option value="Kávé & Étterem">☕ Kávé & Étterem</option>
                        <option value="Egyéb">📦 Egyéb</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Időszak (Hónap/Év)</label>
                    <input type="month" id="exp-date" required
                        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl text-xs transition shadow-md shadow-blue-100 cursor-pointer">
                    Hozzáadás a listához
                </button>
            </form>
        </div>

        <div class="md:col-span-2 space-y-6">
            
            <div class="bg-white rounded-3xl p-6 shadow-xs border border-slate-200/60 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider whitespace-nowrap">Szűrés:</label>
                    <input type="month" id="filter-date" onchange="loadExpenses()"
                        class="px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>
                <div class="text-right w-full sm:w-auto bg-slate-900 text-white px-5 py-3 rounded-2xl">
                    <span class="text-xs text-slate-400 block font-medium">Időszaki összes költés</span>
                    <span id="total-amount" class="text-xl font-black text-white">0 Ft</span>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-xs border border-slate-200/60">
                <h3 class="text-sm font-bold text-slate-900 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-chart-pie text-purple-500"></i> Kategória szerinti megoszlás
                </h3>
                <div class="max-w-[280px] mx-auto">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-xs border border-slate-200/60 space-y-3">
                <h3 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                    <i class="fa-solid fa-list text-emerald-500"></i> Költések listája
                </h3>
                <div id="expense-list" class="space-y-2 max-h-[300px] overflow-y-auto pr-1">
                    <p class="text-xs text-slate-400 text-center py-4">Nincs rögzített tétel ebben az időszakban.</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        const today = new Date();
        const currentMonthStr = today.toISOString().substring(0, 7);
        document.getElementById('exp-date').value = currentMonthStr;
        document.getElementById('filter-date').value = currentMonthStr;

        let myChart = null;

        // Form beküldése
        document.getElementById('expense-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('exp-amount').value);
            const name = document.getElementById('exp-name').value.trim();
            const category = document.getElementById('exp-category').value;
            const date = document.getElementById('exp-date').value;

            const expense = {
                id: Date.now(),
                amount,
                name: name || category, // Ha nincs név megadva, alapértelmezetten a kategória lesz az
                category,
                date
            };

            let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            expenses.push(expense);
            localStorage.setItem('expenses', JSON.stringify(expenses));

            document.getElementById('exp-amount').value = '';
            document.getElementById('exp-name').value = '';
            document.getElementById('filter-date').value = date;
            loadExpenses();
        });

        // Adatok betöltése
        function loadExpenses() {
            const filterDate = document.getElementById('filter-date').value;
            const expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            const listContainer = document.getElementById('expense-list');
            
            const filtered = expenses.filter(exp => exp.date === filterDate);
            
            listContainer.innerHTML = '';
            let total = 0;

            const chartDataObj = {
                "Bevásárlás": 0,
                "Rezsi & Lakás": 0,
                "Utazás & Auto": 0,
                "Szórakozás": 0,
                "Kávé & Étterem": 0,
                "Egyéb": 0
            };

            if (filtered.length === 0) {
                listContainer.innerHTML = '<p class="text-xs text-slate-400 text-center py-4">Nincs rögzített tétel ebben az időszakban.</p>';
            } else {
                filtered.forEach(exp => {
                    total += exp.amount;
                    chartDataObj[exp.category] += exp.amount;

                    // Dinamikus név vagy kategória kiírás
                    const displayName = exp.name;
                    const subLabel = exp.name !== exp.category ? `<span class="text-[10px] text-slate-400">${exp.category}</span>` : '';

                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100 text-xs";
                    item.innerHTML = `
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-900">${displayName}</span>
                            ${subLabel}
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-black text-slate-900">-${exp.amount.toLocaleString()} Ft</span>
                            <button onclick="deleteExpense(${exp.id})" class="text-slate-300 hover:text-red-500 transition cursor-pointer">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    `;
                    listContainer.appendChild(item);
                });
            }

            document.getElementById('total-amount').innerText = total.toLocaleString() + ' Ft';
            updateChart(chartDataObj);
        }

        function deleteExpense(id) {
            let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            expenses = expenses.filter(exp => exp.id !== id);
            localStorage.setItem('expenses', JSON.stringify(expenses));
            loadExpenses();
        }

        function updateChart(dataObj) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const labels = Object.keys(dataObj);
            const data = Object.values(dataObj);
            const hasData = data.some(val => val > 0);

            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: hasData ? data : [1],
                        backgroundColor: hasData ? [
                            '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#64748b'
                        ] : ['#e2e8f0'],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { boxWidth: 12, font: { size: 11 } }
                        }
                    },
                    cutout: '65%'
                }
            });
        }

        function exportData() {
            const dataStr = localStorage.getItem('expenses') || "[]";
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = `kiadasaim_mentes_${new Date().toISOString().slice(0,10)}.json`;
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedExpenses = JSON.parse(e.target.result);
                    if (Array.isArray(importedExpenses)) {
                        localStorage.setItem('expenses', JSON.stringify(importedExpenses));
                        alert('Az adatok sikeresen beolvasva és visszaállítva!');
                        loadExpenses();
                    } else {
                        alert('Hibás fájlformátum!');
                    }
                } catch (err) {
                    alert('Hiba történt a fájl beolvasása közben.');
                }
            };
            reader.readAsText(file);
        }

        loadExpenses();
    </script>
</body>
</html>
